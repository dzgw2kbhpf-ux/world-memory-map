<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>World Memory Map</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<header>
<h1>🌍 World Memory Map</h1>
<p>あなたの人生の場所を記録する</p>
</header>

<div id="controls">

<input id="placeName" placeholder="場所名">

<input id="lat" placeholder="緯度">

<input id="lng" placeholder="経度">

<textarea id="memo" placeholder="思い出"></textarea>

<button onclick="addPlace()">追加</button>

</div>

<div id="stats">
訪れた場所: <span id="count">0</span>
</div>

<div id="map"></div>

<script src="script.js"></script>

</body>
</html>
